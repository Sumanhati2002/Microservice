server:
  port: 8181
  
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/UserService-MS
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
   
    